name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Core runtime deps needed to import the package (maigret/holehe are
          # invoked as subprocesses and are not imported, so they are skipped here).
          pip install httpx dnspython python-whois phonenumbers jinja2 pyyaml \
                      "pydantic>=2" pydantic-settings typer rich
          pip install -r requirements-dev.txt
          pip install -e . --no-deps

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Tests (pytest)
        run: pytest
